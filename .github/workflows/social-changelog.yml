name: Social Media Changelog

# Triggers on every PR merged to main.
# Every 5th merge of the day, uses the Claude CLI to generate a social media
# post (Twitter/X thread + LinkedIn) using the AIDA copy framework, then
# files it as a GitHub issue for easy copy-paste.

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  social-changelog:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write

    steps:
      # ── 1. Count PRs merged to main today ────────────────────────────────
      - name: Count today's merged PRs
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state merged \
            --base main \
            --limit 100 \
            --json number,mergedAt \
            --jq "[.[] | select(.mergedAt | startswith(\"$TODAY\"))] | length")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "PRs merged to main today: $COUNT"

      # ── 2. Gate: only proceed on every 5th merge ─────────────────────────
      - name: Check if changelog milestone reached
        id: gate
        run: |
          COUNT=${{ steps.count.outputs.count }}
          if [ "$COUNT" -gt 0 ] && [ $((COUNT % 5)) -eq 0 ]; then
            echo "generate=true" >> "$GITHUB_OUTPUT"
            echo "Milestone reached ($COUNT merged today) — generating social changelog"
          else
            echo "generate=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: $COUNT PRs merged today (not yet a multiple of 5)"
          fi

      # ── 3. Fetch PR titles + labels for today ────────────────────────────
      - name: Fetch today's merged PR details
        if: steps.gate.outputs.generate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=${{ steps.count.outputs.today }}
          # Exclude bot authors; keep only number, title, labels, and author
          gh pr list \
            --repo "${{ github.repository }}" \
            --state merged \
            --base main \
            --limit 100 \
            --json number,title,labels,author,mergedAt \
            --jq "[.[] \
              | select(.mergedAt | startswith(\"$TODAY\")) \
              | select(.author.login | test(\"\\\\[bot\\\\]$\"; \"i\") | not) \
              | {number: .number, title: .title, labels: [.labels[].name], author: .author.login}]" \
            > /tmp/prs.json
          echo "Fetched PR data:"
          cat /tmp/prs.json

      # ── 4. Install Claude CLI ─────────────────────────────────────────────
      - name: Install Claude CLI
        if: steps.gate.outputs.generate == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # ── 5. Build the generation prompt ───────────────────────────────────
      # Written to a file so special characters in PR data don't break quoting
      - name: Build Claude prompt
        if: steps.gate.outputs.generate == 'true'
        run: |
          TODAY=${{ steps.count.outputs.today }}
          COUNT=${{ steps.count.outputs.count }}

          # Static opening — single-quoted heredoc prevents variable expansion
          cat > /tmp/prompt.txt << 'STATIC_OPEN'
You are a developer advocate writing punchy social media copy for **Code Factory** — an open-source, AI-powered GitHub PR manager. It watches your repositories, triages review comments, and automatically dispatches AI coding agents (Claude or Codex) to fix code. The whole thing runs on your machine — no external hosting, no subscriptions.

Your mission: write copy that makes developers stop scrolling and want to try the tool.

Use the **AIDA copywriting framework**:
- **Attention** — Open with a bold hook. Lead with a striking benefit, a pain point every developer recognises, or a surprising capability.
- **Interest** — Highlight the 2-3 most compelling changes from today's merged PRs in plain, jargon-free language.
- **Desire** — Paint a picture of the outcome: time saved, review cycles cut, bugs auto-fixed while you sleep. Make the reader *want* that life.
- **Action** — Close with a clear, low-friction CTA. Direct them to the repo, invite them to star it, try it, or contribute.

Today's merged pull requests (JSON):
STATIC_OPEN

          # Append dynamic PR data
          cat /tmp/prs.json >> /tmp/prompt.txt

          # Static closing instructions
          cat >> /tmp/prompt.txt << 'STATIC_CLOSE'

---

Write exactly TWO sections, with these headings:

## Twitter/X Thread

Write a 2–3 tweet thread. Rules:
- Each tweet ≤ 280 characters (strictly enforced).
- Number them (1/3), (2/3), (3/3).
- First tweet: the Attention hook — make it impossible to scroll past.
- Middle tweet(s): Interest + Desire — what changed, why it matters.
- Last tweet: Action CTA + the placeholder [REPO_URL] + relevant hashtags.
- Use emojis purposefully (not decoratively). Suggested hashtags: #AI #DevTools #GitHub #OpenSource #CodeReview

## LinkedIn / General

Write a 3–5 paragraph post with a narrative arc following AIDA:
- Paragraph 1 (Attention): powerful opening line, then set the scene.
- Paragraphs 2–3 (Interest + Desire): walk through the specific changes, connecting each to a developer pain point and its resolution.
- Final paragraph (Action): CTA, [REPO_URL] placeholder, and a closing hashtag block.

Tone: enthusiastic but grounded. Developer-first. No buzzword soup. Honest about what the tool does and doesn't do.
STATIC_CLOSE

          echo "Prompt written to /tmp/prompt.txt"

      # ── 6. Call Claude CLI to generate the post ──────────────────────────
      - name: Generate social media post with Claude CLI
        if: steps.gate.outputs.generate == 'true'
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(cat /tmp/prompt.txt)
          # -p = print mode (non-interactive); --output-format text = plain text output
          claude -p --output-format text "$PROMPT" > /tmp/social-post.md
          echo "--- Generated social post ---"
          cat /tmp/social-post.md

      # ── 7. Ensure the 'changelog' label exists ───────────────────────────
      - name: Ensure changelog label exists
        if: steps.gate.outputs.generate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create changelog \
            --repo "${{ github.repository }}" \
            --color "0075ca" \
            --description "Auto-generated release notes and social media changelogs" \
            2>/dev/null || true

      # ── 8. File the post as a GitHub issue ───────────────────────────────
      - name: Create GitHub issue with social media post
        if: steps.gate.outputs.generate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=${{ steps.count.outputs.today }}
          COUNT=${{ steps.count.outputs.count }}
          REPO_URL="https://github.com/${{ github.repository }}"

          {
            echo "## 📣 Social Media Changelog — $TODAY"
            echo ""
            echo "**Milestone:** $COUNT PRs merged to \`main\` today"
            echo ""
            echo "> **How to use:** Copy a section below, replace \`[REPO_URL]\` with \`$REPO_URL\`, and post it."
            echo ""
            echo "---"
            echo ""
            # Substitute the repo URL placeholder inline
            sed "s|\[REPO_URL\]|$REPO_URL|g" /tmp/social-post.md
            echo ""
            echo "---"
            echo ""
            echo "<sub>Auto-generated by the [social-changelog workflow](.github/workflows/social-changelog.yml) · Claude CLI · AIDA copy framework</sub>"
          } > /tmp/issue-body.md

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "📣 Social Media Changelog: $TODAY (${COUNT} PRs merged)" \
            --body-file /tmp/issue-body.md \
            --label "changelog"
